<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>「非公開フォルダの中身」展</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Shippori+Mincho:wght@400;600;700;800&family=Zen+Kaku+Gothic+New:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #09090b; overscroll-behavior: none; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { font-family: "Zen Kaku Gothic New", -apple-system, sans-serif; }

  /* hide scrollbars inside swipe areas */
  .no-sb::-webkit-scrollbar { display: none; }
  .no-sb { scrollbar-width: none; }

  @keyframes nudge {
    0%, 100% { transform: translateX(0); }
    50% { transform: translateX(-14px); }
  }
  @keyframes pulse-red {
    0%, 100% { opacity: .4; }
    50% { opacity: 1; }
  }
  @keyframes tape-scroll {
    from { background-position: 0 0; }
    to { background-position: 80px 0; }
  }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="lp-swipe.jsx"></script>
<script type="text/babel" src="app.jsx"></script>
</body>
</html>
